name: CI - Verify and Coverage

on:
  pull_request:
    branches: [ "**" ]
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build, Verify and Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: 'maven'

      - name: Build and Test
        run: mvn -B verify

      - name: Upload JaCoCo HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: |
            target/site/jacoco/**
          if-no-files-found: error
          retention-days: 7